name: Generate HTML from README

on:
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/generate-html.yml'
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  generate-html:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Generate HTML from README
        run: |
          pandoc README.md -o Japan-Trip-2026-Itinerary.html \
            --from markdown \
            --to html5 \
            --self-contained \
            --css-url="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" \
            --metadata title="Japan Trip 2026 Itinerary" \
            --lua-filter=<(cat << 'EOF'
              -- Add Bootstrap styling
              function Header(el)
                el.attributes.class = "mt-4 mb-3"
                return el
              end
              function Table(el)
                el.attributes.class = "table table-striped"
                return el
              end
              function Code(el)
                el.attributes.class = "bg-light p-2 rounded"
                return el
              end
            EOF
            )

      - name: Create custom styled HTML
        run: |
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('README.md', 'r', encoding='utf-8') as f:
              markdown_content = f.read()

          html_template = '''<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip 2026 - Aventure Pokémon & Parcs à Thème</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        h3 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #f8f9fa;
        }

        table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }

        table tr:hover {
            background: #e8ecff;
        }

        ul, ol {
            margin: 15px 0 15px 30px;
        }

        li {
            margin: 8px 0;
        }

        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            line-height: 1.4;
        }

        pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .mermaid {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            border: 2px dashed #667eea;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        blockquote {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            font-style: italic;
        }

        a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #dee2e6;
            font-size: 0.9em;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
            }
            .header {
                background: white;
                color: #333;
                border-bottom: 2px solid #667eea;
            }
            .header h1 {
                color: #667eea;
            }
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            .header h1 {
                font-size: 1.8em;
            }
            table {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Japon 2026</h1>
            <p>Aventure Pokémon & Parcs à Thème</p>
        </div>

        <div class="content">
            {CONTENT}
        </div>

        <div class="footer">
            <p>Itinéraire généré automatiquement | 14 jours au Japon (6-20 juillet 2026)</p>
            <p><small>Prêt à imprimer et partager</small></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true, theme: 'default' });
        mermaid.contentLoaded();
    </script>
</body>
</html>'''

          # Convert markdown to basic HTML
          import markdown
          from markdown.extensions.tables import TableExtension
          from markdown.extensions.codehilite import CodeHiliteExtension

          md = markdown.Markdown(extensions=[
              TableExtension(),
              CodeHiliteExtension(use_pygments=False),
              'extra',
              'meta'
          ])

          html_content = md.convert(markdown_content)

          # Replace Mermaid code blocks
          html_content = re.sub(
              r'<pre><code class="language-mermaid">(.*?)</code></pre>',
              r'<div class="mermaid">\1</div>',
              html_content,
              flags=re.DOTALL
          )

          final_html = html_template.replace('{CONTENT}', html_content)

          with open('Japan-Trip-2026-Itinerary.html', 'w', encoding='utf-8') as f:
              f.write(final_html)

          print("✅ HTML generated successfully")
          PYTHON_SCRIPT

      - name: Verify HTML exists
        run: |
          if [ -f Japan-Trip-2026-Itinerary.html ]; then
            echo "✅ HTML generated successfully"
            ls -lh Japan-Trip-2026-Itinerary.html
            file Japan-Trip-2026-Itinerary.html
          else
            echo "❌ HTML generation failed"
            exit 1
          fi

      - name: Upload HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Japan-Trip-HTML
          path: Japan-Trip-2026-Itinerary.html
          retention-days: 90

      - name: Comment PR with download info
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌐 HTML Export Generated ✅

Your Japan trip itinerary has been converted to an interactive HTML page!

📥 **Download**: Check the "Artifacts" section to download \`Japan-Trip-2026-Itinerary.html\`

✨ **HTML Includes**:
- 📅 Complete 14-day interactive itinerary
- 🎨 Professional styling with responsive design
- 💫 Mermaid journey visualization (interactive)
- 💰 Budget breakdown (~1035€)
- 🗺️ All attractions & Pokémon Centers
- 🎮 All attractions & locations
- ✅ Practical tips & checklists
- 🖨️ Print-friendly format
- 📱 Mobile responsive design`
            });

      - name: Comment PR if HTML generation failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ HTML Generation Issue

HTML generation encountered an issue. Please check the workflow logs for details.

📄 You can still read the itinerary directly in the README.md file.`
            });
