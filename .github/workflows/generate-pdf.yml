name: Generate PDF from README

on:
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/generate-pdf.yml'
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Generate PDF from README
        run: |
          md-to-pdf README.md \
            --launch-timeout 30000 \
            --pdf-options "{\"format\": \"A4\", \"margin\": \"10mm\", \"displayHeaderFooter\": true, \"footerTemplate\": \"<div style='font-size: 10px; width: 100%; padding: 10px; text-align: center;'><span class='pageNumber'></span>/<span class='totalPages'></span></div>\"}"
        continue-on-error: true

      - name: Fallback: Use pandoc with latex
        if: failure()
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-latex-extra
          pandoc README.md -o Japan-Trip-2026-Itinerary.pdf \
            --from markdown \
            --pdf-engine xelatex \
            --variable mainfont="DejaVu Sans" \
            --variable monofont="DejaVu Sans Mono" \
            -V geometry:margin=1cm

      - name: Rename file if needed
        run: |
          if [ -f "README.pdf" ]; then
            mv README.pdf Japan-Trip-2026-Itinerary.pdf
          fi

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Japan-Trip-PDF
          path: Japan-Trip-2026-Itinerary.pdf
          retention-days: 90

      - name: Verify PDF exists
        run: |
          if [ -f Japan-Trip-2026-Itinerary.pdf ]; then
            echo "✅ PDF generated successfully"
            ls -lh Japan-Trip-2026-Itinerary.pdf
            file Japan-Trip-2026-Itinerary.pdf
          else
            echo "❌ PDF generation failed"
            exit 1
          fi

      - name: Comment PR with download info
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📄 PDF Export Generated ✅

Your Japan trip itinerary has been converted to PDF!

📥 **Download**: Check the "Artifacts" section to download \`Japan-Trip-2026-Itinerary.pdf\`

✨ **PDF Includes**:
- 📅 Complete 14-day itinerary
- 💰 Budget breakdown (~1035€)
- 🗺️ Mermaid journey visualization
- 🎮 All attractions & Pokémon Centers
- 🎌 Manga, Ninja & Samurai experiences
- ✅ Practical tips & checklists
- 🖨️ Printable format (A4, ready to print)`
            });

      - name: Comment PR if PDF generation failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ PDF Generation Issue

PDF generation encountered an issue. Please check the workflow logs for details.

📄 You can still read the itinerary directly in the README.md file.`
            });
