name: Generate PDF from README

on:
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/generate-pdf.yml'
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3-weasyprint fonts-noto-cjk

      - name: Generate PDF from README
        run: |
          pandoc README.md \
            -f markdown \
            -t pdf \
            -o Japan-Trip-2026-Itinerary.pdf \
            --pdf-engine=weasyprint \
            -V geometry:margin=1.5cm \
            -V fontsize=11pt

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Japan-Trip-PDF
          path: Japan-Trip-2026-Itinerary.pdf
          retention-days: 90

      - name: Comment PR with download info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📄 PDF Export Generated

**Your Japan trip itinerary has been converted to PDF!**

📥 **Download**: Check the "Artifacts" section at the top of this PR to download \`Japan-Trip-2026-Itinerary.pdf\`

✨ **Includes**:
- ✅ Complete 14-day itinerary
- ✅ Budget breakdown (~920€)
- ✅ Mermaid journey visualization
- ✅ All attractions & Pokémon Centers
- ✅ Practical tips & checklists
- ✅ Printable format`
            });

      - name: Verify PDF generation
        run: |
          if [ -f Japan-Trip-2026-Itinerary.pdf ]; then
            echo "✅ PDF generated successfully"
            ls -lh Japan-Trip-2026-Itinerary.pdf
          else
            echo "❌ PDF generation failed"
            exit 1
          fi
